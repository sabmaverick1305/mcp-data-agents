# Namespace-level resource cap — prevents a runaway deployment from
# starving other workloads on the cluster.

apiVersion: v1
kind: ResourceQuota
metadata:
  name: mcp-agents-quota
  namespace: mcp-agents
spec:
  hard:
    # Compute
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    # Storage
    requests.storage: 50Gi
    persistentvolumeclaims: "6"
    # Object counts
    pods: "20"
    services: "10"
    secrets: "10"
    configmaps: "10"

---
# LimitRange: applies default requests/limits to any container that
# omits them (guards against accidentally unbounded containers)
apiVersion: v1
kind: LimitRange
metadata:
  name: mcp-agents-limits
  namespace: mcp-agents
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
