# Placeholder — in production inject via AWS Secrets Manager + External Secrets Operator
# or: kubectl create secret generic mcp-agents-secret \
#       --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#       -n mcp-agents
#
# When USE_BEDROCK=true, ANTHROPIC_API_KEY is not needed —
# credentials come from the pod's IRSA service account (see app-deployment.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: mcp-agents-secret
  namespace: mcp-agents
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"     # not needed when USE_BEDROCK=true (IRSA handles creds)
  API_KEYS: "REPLACE_ME_WITH_COMMA_SEPARATED_KEYS"  # e.g. "key-abc123,key-def456"
