apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-agents-app
  namespace: mcp-agents
  labels:
    app: mcp-agents-app
spec:
  replicas: 2          # HPA will adjust this between 2 and 10
  selector:
    matchLabels:
      app: mcp-agents-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime deploys
  template:
    metadata:
      labels:
        app: mcp-agents-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mcp-agents-sa   # IRSA — carries bedrock:InvokeModel IAM role

      # Pod-level: all containers inherit this unless overridden
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: true   # needed for IRSA token projection

      containers:
        - name: app
          image: <YOUR_ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/mcp-data-agents:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # Container-level hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # uvicorn writes temp files; set true if using tmpfs
            capabilities:
              drop: ["ALL"]

          envFrom:
            - configMapRef:
                name: mcp-agents-config
            - secretRef:
                name: mcp-agents-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: warehouse-data
              mountPath: /app/data

      volumes:
        - name: warehouse-data
          persistentVolumeClaim:
            claimName: warehouse-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: warehouse-pvc
  namespace: mcp-agents
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: gp3           # EKS gp3 EBS
  resources:
    requests:
      storage: 5Gi

---
# IRSA ServiceAccount — annotate with your IAM role ARN after creating it
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-agents-sa
  namespace: mcp-agents
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/mcp-agents-bedrock-role"
