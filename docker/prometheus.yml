global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mcp-agents
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

alerting:
  alertmanagers: []

