version: "3.9"

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  mcp-net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  redis-data:
  chroma-data:
  warehouse-data:
  prometheus-data:
  grafana-data:

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── FastAPI application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-data-agents:latest
    container_name: mcp-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # LLM backend
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      USE_BEDROCK: "${USE_BEDROCK:-false}"
      BEDROCK_REGION: "${BEDROCK_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      # Auth — api_key | jwt | none
      AUTH_MODE: "${AUTH_MODE:-api_key}"
      API_KEYS: "${API_KEYS:-dev-key-change-me}"
      ALLOWED_TENANTS: "${ALLOWED_TENANTS:-}"
      JWKS_URL: "${JWKS_URL:-}"
      # Backing services
      REDIS_URL: "redis://redis:6379"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      SEED_MODE: "${SEED_MODE:-demo}"
    volumes:
      - warehouse-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── ChromaDB ─────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: mcp-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mcp-net
    depends_on:
      - app

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    networks:
      - mcp-net
    depends_on:
      - prometheus
